name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test (coverage gate >= 90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install pinned Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest with coverage gate
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=90

  gui-build:
    name: GUI build (TypeScript / esbuild)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui-src/package-lock.json

      - name: Install GUI dependencies
        working-directory: gui-src
        run: npm ci

      - name: Typecheck
        working-directory: gui-src
        run: npm run typecheck

      - name: Build GUI bundle
        working-directory: gui-src
        run: npm run build
