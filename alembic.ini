# Alembic config. The DB URL is supplied at runtime — via the RECEIPT_BOARD_DB_URL
# environment variable for the `alembic` CLI, or programmatically by
# receipt_board.persistence.migrate.run_migrations (used at first-run and in tests).
[alembic]
script_location = src/receipt_board/persistence/migrations
prepend_sys_path = src
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
